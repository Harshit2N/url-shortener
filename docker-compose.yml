version: '3.9'

services:
  backend:
    build:
      context: ./backend    
      dockerfile: Dockerfile
      target: production      
    container_name: url-shortener-backend
    restart: unless-stopped   
    ports:
      - "3000:3000"     
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BASE_URL=http://localhost:3000
      - REDIS_URL=redis://redis:6379
      - ALLOWED_ORIGIN=http://localhost:5173 
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

  redis:
    image: redis:7-alpine   
    container_name: url-shortener-redis
    restart: unless-stopped
    ports:
      - "6379:6379"         
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data     
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - app-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: url-shortener-redis-gui
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

volumes:
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge